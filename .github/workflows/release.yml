name: release

# Publish the @kurajs/* packages (and create-kura) to npm via OIDC Trusted Publishing —
# no long-lived npm token. Versions come from each package.json; a package whose version
# is already on npm is skipped, so the monorepo's independently-versioned packages can
# release together. Trigger by pushing a tag (e.g. `v0.0.2`) or running it manually.
#
# One-time npm setup (per package, on npmjs.com → package → Settings → Trusted Publisher):
#   Publisher: GitHub Actions · Org/User: kurajs · Repository: kura · Workflow: release.yml
# Do this for @kurajs/core, @kurajs/search, @kurajs/tokenizers, @kurajs/transformers, @kurajs/docs, @kurajs/cli, create-kura.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24 # bundles npm 11.16 — recent enough for OIDC trusted publishing (needs >= 11.5.1)
          registry-url: https://registry.npmjs.org

      # NOTE: do NOT `npm install -g npm@latest` here. Upgrading the toolcache npm in place prunes its
      # bundled `sigstore` dep, which `npm publish --provenance` loads — the publish then dies with
      # "Cannot find module 'sigstore'". Node 24's bundled npm is both recent AND complete, so use it
      # as-is. bun still builds the packages below; node/npm are only for the provenance publish.

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # bun.lock replaced package-lock.json, so `npm ci` no longer works. sharp installs via its
      # prebuilt binaries under Bun (no source build), so no --ignore-scripts dance is needed.
      - run: bun install --frozen-lockfile

      # Build in dependency order (core → … → ctrlk → docs → cli). ctrlk before docs:
      # @kurajs/docs/client imports @kurajs/ctrlk, so its dist/types must exist first.
      - run: bun run --filter @kurajs/core build
      - run: bun run --filter @kurajs/search build
      - run: bun run --filter @kurajs/tokenizers build
      - run: bun run --filter @kurajs/ctrlk build
      - run: bun run --filter @kurajs/transformers build
      - run: bun run --filter @kurajs/docs build
      - run: bun run --filter @kurajs/cli build

      - name: Publish changed packages
        run: |
          set -uo pipefail
          failed=""
          for dir in packages/*; do
            [ -f "$dir/package.json" ] || continue
            name=$(node -p "require('./$dir/package.json').name")
            private=$(node -p "require('./$dir/package.json').private === true")
            [ "$private" = "true" ] && { echo "skip $name (private)"; continue; }
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip $name@$version (already published)"
            else
              echo "publish $name@$version"
              # Don't let one package's failure skip the rest — collect and fail at the end.
              # Internal @kurajs deps are explicit >=X <0.1.0 ranges (not workspace:*), so npm packs
              # them verbatim — which keeps --provenance working (it does NOT on a pre-built bun
              # tarball). The grep is a safety net: refuse to publish if a workspace:/catalog:
              # protocol ever sneaks into a dependency value (npm would ship it literally).
              if ( cd "$dir" \
                && ! grep -qE '": *"(workspace|catalog):' package.json \
                && npm publish --access public --provenance ); then
                echo "ok $name@$version"
              else
                echo "FAILED $name@$version"
                failed="$failed $name@$version"
              fi
            fi
          done
          if [ -n "$failed" ]; then echo "::error::publish failed for:$failed"; exit 1; fi
